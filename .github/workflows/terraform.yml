name: Terraform

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.tf"
      - "tests/integration/**"

jobs:
  lint-terraform:
    name: Terraform lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo snap install terraform --classic
          sudo snap install just --classic
      - name: Lint the Terraform modules
        run: just lint-terraform
  lint-terraform-docs:
    name: Lint terraform docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo snap install terraform --classic
          sudo snap install terraform-docs
          sudo snap install just --classic
      - name: Lint the Terraform docs
        run: just lint-terraform-docs
  validate-terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo snap install terraform --classic
          sudo snap install just --classic
      - name: Validate the Terraform modules
        run: just validate-terraform
  test-unit:
    name: Terraform unit tests
    needs: [lint-terraform, lint-terraform-docs, validate-terraform]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo snap install terraform --classic
          sudo snap install just --classic
      - name: Unit test the Terraform modules
        run: just unit
  changes:
    name: Detect changed products
    runs-on: ubuntu-latest
    outputs:
      cos: ${{ steps.filter.outputs.cos }}
      cos_lite: ${{ steps.filter.outputs.cos_lite }}
      cos_dev: ${{ steps.filter.outputs.cos_dev }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Filter changed paths per product
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Shared paths affect *both* products, so they trigger both suites
            shared: &shared
              - '.github/workflows/terraform.yml'
              - '.github/workflows/_integration.yml'
              - 'tests/integration/conftest.py'
              - 'tests/integration/helpers.py'
            cos:
              - *shared
              - 'terraform/cos/**'
              - 'tests/integration/cos/**'
            cos_lite:
              - *shared
              - 'terraform/cos-lite/**'
              - 'tests/integration/cos_lite/**'
            cos_dev:
              - *shared
              - 'terraform/cos-dev/**'
              - 'tests/integration/cos_dev/**'
  test-integration-cos-lite:
    name: COS Lite Terraform integration
    needs: [test-unit, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cos_lite == 'true' }}
    uses: canonical/observability-stack/.github/workflows/_integration.yml@MichaelThamm-patch-1
    with:
      product: cos_lite
      runner: self-hosted-linux-amd64-noble-large
  test-integration-cos:
    name: COS Terraform integration
    needs: [test-unit, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cos == 'true' }}
    uses: canonical/observability-stack/.github/workflows/_integration.yml@MichaelThamm-patch-1
    with:
      product: cos
      runner: self-hosted-linux-amd64-noble-xlarge
