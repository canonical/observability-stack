name: Deploy COS
description: >
  Deploy Canonical Observability Stack into a Juju model using Terraform.
  Handles both github-hosted (via concierge) and self-hosted runner environments.

inputs:
  scale:
    description: "COS scale mode: monolithic (single role-all worker) or distributed (separate backend/read/write workers)"
    required: true
  storage:
    description: "S3 storage backend: seaweedfs or ceph"
    required: true
  cos-model:
    description: "Name of the Juju model to deploy COS into"
    required: false
    default: cos
  juju-channel:
    description: "Juju snap channel"
    required: false
    default: "3.6/stable"

outputs:
  cos-model:
    description: "Name of the Juju model where COS was deployed"
    value: ${{ steps.set-output.outputs.cos-model }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        case "${{ inputs.scale }}" in
          monolithic|distributed) ;;
          *) echo "Unknown scale: ${{ inputs.scale }}. Must be 'monolithic' or 'distributed'."; exit 1 ;;
        esac
        case "${{ inputs.storage }}" in
          seaweedfs|ceph) ;;
          *) echo "Unknown storage: ${{ inputs.storage }}. Must be 'seaweedfs' or 'ceph'."; exit 1 ;;
        esac

    # --- Infrastructure setup ---
    - name: Concierge prepare
      if: ${{ runner.environment == 'github-hosted' }}
      shell: bash
      run: |
        sudo snap install concierge --classic
        sudo concierge prepare --juju-channel ${{ inputs.juju-channel }} -p microk8s --extra-snaps terraform

    - name: Install snaps
      if: ${{ runner.environment == 'self-hosted' }}
      shell: bash
      run: |
        sudo snap install juju --classic --channel=${{ inputs.juju-channel }}
        sudo snap install terraform --classic

    - name: Configure microk8s Docker Hub mirror
      if: ${{ runner.environment == 'self-hosted' }}
      shell: bash
      run: |
        sudo snap install microk8s --channel "1.34-strict/stable" --classic
        sudo adduser "$USER" snap_microk8s

        until sudo iptables --list | grep -q -i "microk8s"
        do
          echo "MicroK8s has not yet configured iptables."
          sleep 10
        done

        sudo tee /var/snap/microk8s/current/args/certs.d/docker.io/hosts.toml << EOF
        server = "$DOCKERHUB_MIRROR"
        [host."${DOCKERHUB_MIRROR#'https://'}"]
        capabilities = ["pull", "resolve"]
        EOF
        sudo microk8s stop
        sudo microk8s start

    - name: Set up microk8s
      if: ${{ runner.environment == 'self-hosted' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install retry -y
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s status --wait-ready
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- retry --times 3 --delay 5 -- sudo microk8s enable dns
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s status --wait-ready
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s.kubectl rollout status --namespace kube-system --watch --timeout=5m deployments/coredns
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- retry --times 3 --delay 5 -- sudo microk8s enable hostpath-storage
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s.kubectl rollout status --namespace kube-system --watch --timeout=5m deployments/hostpath-provisioner

        IPADDR=$(ip -4 -j route get 2.2.2.2 | sed -n -e 's/^.*prefsrc\":"\([^ "]*\).*/\1/p')
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- retry --times 3 --delay 5 -- sudo microk8s enable "metallb:$IPADDR-$IPADDR"
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s status --wait-ready
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- retry --times 3 --delay 5 -- sudo microk8s enable rbac
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s status --wait-ready

        mkdir ~/.kube/
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- microk8s config | sudo tee ~/.kube/config > /dev/null

    - name: Bootstrap Juju
      if: ${{ runner.environment == 'self-hosted' }}
      shell: bash
      run: |
        mkdir -p ~/.local/share/juju
        sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- juju bootstrap microk8s --config model-logs-size=10G microk8s
        juju model-defaults logging-config='<root>=INFO; unit=DEBUG'

    # --- S3 storage backend ---
    - name: Install and configure MicroCeph
      if: ${{ inputs.storage == 'ceph' }}
      shell: bash
      run: |
        function check_ceph_ok_or_exit () {
            i=0
            for i in {1..5}; do
                if sudo microceph.ceph status | grep HEALTH_OK; then
                    break
                else
                    sudo microceph.ceph status
                    sleep 30
                    sudo microceph.ceph health detail
                fi
            done
            if [ "$i" -eq 5 ]; then
                exit 1
            fi
        }

        sudo snap install microceph
        sudo microceph cluster bootstrap
        sleep 30s
        sudo microceph.ceph config set "mon.$(hostname)" mon_data_avail_warn 6
        sudo microceph disk add loop,2G,3
        check_ceph_ok_or_exit

        sudo microceph enable rgw --port 8080 --ssl-port 8443
        sudo microceph.radosgw-admin user create --uid=user --display-name=User
        sudo microceph.radosgw-admin key create --uid=user --key-type=s3 --access-key=access-key --secret-key=secret-key

        {
          echo "S3_ENDPOINT=http://$(ip -4 -j route get 2.2.2.2 | jq -r '.[] | .prefsrc'):8080"
          echo "S3_ACCESS_KEY=access-key"
          echo "S3_SECRET_KEY=secret-key"
        } >> "$GITHUB_ENV"

    # --- Create model and deploy COS ---
    - name: Create Juju model
      shell: bash
      run: juju add-model ${{ inputs.cos-model }}

    - name: Deploy COS
      shell: bash
      run: |
        MODEL_UUID=$(juju show-model ${{ inputs.cos-model }} --format json | jq -r '.["${{ inputs.cos-model }}"]["model-uuid"]')

        if [[ "${{ inputs.storage }}" == "ceph" ]]; then
          export TF_VAR_storage_backend=s3
          export TF_VAR_s3_endpoint="${S3_ENDPOINT}"
          export TF_VAR_s3_access_key="${S3_ACCESS_KEY}"
          export TF_VAR_s3_secret_key="${S3_SECRET_KEY}"
        else
          export TF_VAR_storage_backend=seaweedfs
        fi

        # The terraform module lives at terraform/cos-dev/ relative to the repo root.
        # github.action_path resolves to .github/actions/deploy-cos/ so we go up three levels.
        cd "${{ github.action_path }}/../../../terraform/cos-dev"
        terraform init
        terraform apply -auto-approve \
          -var="model_uuid=${MODEL_UUID}" \
          -var="topology=${{ inputs.scale }}"

    - name: Wait for deployment
      shell: bash
      run: |
        model="${{ inputs.cos-model }}"
        deadline=$(( $(date +%s) + 1800 ))

        while [ "$(date +%s)" -lt "$deadline" ]; do
          status_json=$(juju status --model "$model" --format json)

          # Collect all unit workload statuses
          unit_statuses=$(echo "$status_json" | jq -r '
            [.applications | to_entries[] | .value.units // {} | to_entries[] | .value["workload-status"].current] | @json
          ')

          # Exit successfully when every unit reports "active"
          all_active=$(echo "$unit_statuses" | jq 'length > 0 and all(. == "active")')
          if [ "$all_active" = "true" ]; then
            echo "All applications are active!"
            exit 0
          fi

          # Auto-resolve any errored units so Juju retries the failed hook.
          # This handles transient race conditions (e.g. ingress-relation-created firing
          # before Traefik is ready to accept the relation).
          errored=$(echo "$status_json" | jq -r '
            .applications | to_entries[] | .value.units // {} | to_entries[] |
            select(.value["workload-status"].current == "error") | .key
          ')
          if [ -n "$errored" ]; then
            echo "Auto-resolving errored units (hook retry):"
            while IFS= read -r unit; do
              echo "  - $unit"
              juju resolve "$unit" --model "$model" || true
            done <<< "$errored"
          fi

          sleep 30
        done

        echo "Timeout: not all applications became active within 30 minutes"
        exit 1

    - name: Dump model status on failure
      if: failure()
      shell: bash
      run: |
        echo "===== juju status ====="
        juju status --model ${{ inputs.cos-model }} --color=false

        echo ""
        echo "===== juju debug-log (last 200 lines) ====="
        juju debug-log --model ${{ inputs.cos-model }} --limit 200 --no-tail

        echo ""
        echo "===== kubectl pods ====="
        kubectl get pods --all-namespaces

        echo ""
        echo "===== kubectl describe non-ready pods ====="
        kubectl get pods -n ${{ inputs.cos-model }} --no-headers \
          | awk '{ split($2, a, "/"); if (a[1] != a[2]) print $1 }' \
          | while read -r pod; do
              echo "--- $pod ---"
              kubectl describe pod "$pod" -n ${{ inputs.cos-model }}
              echo ""
            done

        echo ""
        echo "===== kubectl logs for non-ready containers ====="
        kubectl get pods -n ${{ inputs.cos-model }} -o json \
          | jq -r '.items[] | .metadata.name as $pod | .status.containerStatuses[]? | select(.ready == false) | [$pod, .name] | @tsv' \
          | while IFS=$'\t' read -r pod container; do
              echo "--- $pod / $container ---"
              kubectl logs "$pod" -c "$container" -n ${{ inputs.cos-model }} --tail=50 2>&1 || true
              echo ""
            done

    - name: Set output
      id: set-output
      shell: bash
      run: echo "cos-model=${{ inputs.cos-model }}" >> "$GITHUB_OUTPUT"
